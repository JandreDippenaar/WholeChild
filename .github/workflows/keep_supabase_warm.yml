name: Keep Supabase warm

# Free-tier Supabase projects pause after 7 days of zero API activity.
# This workflow pings the public auth-health endpoint once a day; the request
# counts as activity and resets the inactivity clock. Costs nothing.
#
# 09:17 UTC avoids GitHub's :00 cron congestion (scheduled jobs there are
# routinely delayed by several minutes).

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit Supabase auth health endpoint
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "::error::VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY repo secrets are not set"
            exit 1
          fi
          echo "Pinging $SUPABASE_URL/auth/v1/health"
          # -f fails the step on any non-2xx, -sS keeps it quiet but surfaces errors,
          # -w prints the status code at the end so the log shows what we got.
          curl -fsS \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -w "\nHTTP %{http_code} in %{time_total}s\n" \
            "$SUPABASE_URL/auth/v1/health"
